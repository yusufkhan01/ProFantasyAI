services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Allow the dockerised frontend (8080) and the Vite dev server (5173).
      ALLOWED_ORIGINS: "http://localhost:8080,http://localhost:5173"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "http://localhost:8000"
    ports:
      - "8080:80"
    depends_on:
      - backend
